name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          cd LysykhVA/backend
          pip install -r requirements.txt

      - name: Run tests
        run: |
          cd LysykhVA/backend
          pytest -v