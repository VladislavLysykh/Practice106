services:

  backend:
    build: ./backend

    volumes:
      - ./data:/data

  worker:
    build: ./worker

    volumes:
      - ./data:/data

  nginx:
    image: nginx:alpine

    ports:
      - "80:80"

    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf

    depends_on:
      - backend