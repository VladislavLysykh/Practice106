name: CI

on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and test project
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: StrelnikovaDA

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            StrelnikovaDA/backend/requirements.txt
            StrelnikovaDA/worker/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Install worker dependencies
        run: |
          pip install -r worker/requirements.txt

      - name: Validate Docker Compose config
        run: docker compose config

      - name: Build Docker images
        run: docker compose build

      - name: Run backend tests
        run: |
          cd backend
          python -m unittest -v test_backend.py

      - name: Run worker tests
        env:
          DB_PATH: /tmp/tasks.db
          SPELLCHECK_DELAY_SECONDS: "0"
        run: |
          cd worker
          python -m unittest -v test_spellchecker.py